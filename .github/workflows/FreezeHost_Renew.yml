name: FreezeHost 续期

on:
  schedule:
    - cron: '33 1 14 6 *'   # FREEZEHOST_DISCORD_TOKEN_1 - 下一次: 2026-06-14 06:33 UTC
    - cron: '51 2 23 6 *'   # FREEZEHOST_DISCORD_TOKEN_2 - 下一次: 2026-06-23 01:51 UTC
    - cron: '51 3 13 6 *'   # FREEZEHOST_DISCORD_TOKEN_3 - 下一次: 2026-06-13 02:51 UTC
    - cron: '20 4 15 5 *'   # FREEZEHOST_DISCORD_TOKEN_4 - (初始，运行后自动更新)
    - cron: '25 5 20 5 *'   # FREEZEHOST_DISCORD_TOKEN_5 - (初始，运行后自动更新)
  workflow_dispatch:
    inputs:
      token_number:
        description: '选择 Token 编号'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

jobs:
  renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write

    steps:
      - name: 确定使用哪个 Token
        id: select_token
        run: |
          HOUR=$(date -u +%H)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TOKEN_NUM="${{ github.event.inputs.token_number }}"
          else
            case "$HOUR" in
              01) TOKEN_NUM=1 ;;
              02) TOKEN_NUM=2 ;;
              03) TOKEN_NUM=3 ;;
              04) TOKEN_NUM=4 ;;
              05) TOKEN_NUM=5 ;;
              *) TOKEN_NUM=1 ;;
            esac
          fi

          echo "token_number=$TOKEN_NUM" >> "$GITHUB_OUTPUT"
          echo "::notice::选择 Token 编号: $TOKEN_NUM"

      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install camoufox[geoip]
          python -m camoufox fetch
          sudo apt-get update
          sudo apt-get install -y jq bc xvfb

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，直连 DNS..."

          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup free.freezehost.pro 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      - name: 设置 Discord Token
        run: |
          TOKEN_NUM="${{ steps.select_token.outputs.token_number }}"

          case "$TOKEN_NUM" in
            1) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> "$GITHUB_ENV" ;;
            2) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_2 }}" >> "$GITHUB_ENV" ;;
            3) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_3 }}" >> "$GITHUB_ENV" ;;
            4) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_4 }}" >> "$GITHUB_ENV" ;;
            5) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_5 }}" >> "$GITHUB_ENV" ;;
            *) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> "$GITHUB_ENV" ;;
          esac

          echo "::notice::已设置 Token 编号: $TOKEN_NUM"

      - name: 运行续期脚本
        id: run_renew
        env:
          FREEZEHOST_DISCORD_TOKEN: ${{ env.DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "使用 Token 编号: ${{ steps.select_token.outputs.token_number }}"
          python renew.py 2>&1 | tee renew.log

      - name: 提取剩余天数（取所有服务器的最小值）
        id: extract_days
        if: success()
        run: |
          set -e
          
          MIN_DAYS=""
          
          # 优先从 renew_result.json 读取（若存在）
          if [ -f "renew_result.json" ]; then
            MIN_DAYS=$(jq -r '.min_remaining_days // empty' renew_result.json)
            if [ -n "$MIN_DAYS" ]; then
              echo "✅ 从 renew_result.json 读取最小剩余天数: $MIN_DAYS"
            fi
          fi
          
          # 其次从 renew.log 提取所有剩余天数，取最小值
          if [ -z "$MIN_DAYS" ] && [ -f "renew.log" ]; then
            echo "📋 从 renew.log 提取所有服务器剩余天数："
            
            MIN_DAYS=""
            while IFS= read -r line; do
              DAYS=$(echo "$line" | grep -oP '\d+(?=\s*DAYS?)' || echo "0")
              HOURS=$(echo "$line" | grep -oP '\d+\.?\d*(?=\s*HOURS?)' || echo "0")
              
              if [ "$DAYS" != "0" ] || [ "$HOURS" != "0" ]; then
                TOTAL=$(echo "scale=6; $DAYS + ($HOURS / 24)" | bc)
                echo "  - $DAYS 天 + $HOURS 小时 = $TOTAL 天"
                
                if [ -z "$MIN_DAYS" ] || (( $(echo "$TOTAL < $MIN_DAYS" | bc -l) )); then
                  MIN_DAYS="$TOTAL"
                fi
              fi
            done < <(grep -E "续期状态: .* DAYS? AND .* HOURS? REMAINING" renew.log || true)
            
            if [ -n "$MIN_DAYS" ]; then
              echo "✅ 最小剩余天数: $MIN_DAYS"
            fi
          fi
          
          # 如果都没找到，退出
          if [ -z "$MIN_DAYS" ] || [ "$MIN_DAYS" = "0" ]; then
            echo "::warning::未找到有效的剩余时间，跳过 workflow 更新"
            echo "skip_update=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "remaining_days=$MIN_DAYS" >> "$GITHUB_OUTPUT"
          echo "skip_update=false" >> "$GITHUB_OUTPUT"
          echo "::notice::剩余天数（最小值）: $MIN_DAYS"
          
          mkdir -p /tmp/renew_data
          echo "$MIN_DAYS" > /tmp/renew_data/remaining_days.txt

      - name: 拉取仓库
        if: success() && steps.extract_days.outputs.skip_update != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.REPO_TOKEN }}
          path: workflow_repo
          fetch-depth: 1

      - name: 修改 Cron 时间
        if: success() && steps.extract_days.outputs.skip_update != 'true'
        run: |
          set -e

          # 读取剩余天数（优先 output，其次临时文件）
          REMAINING_DAYS="${{ steps.extract_days.outputs.remaining_days }}"
          
          if [ -z "$REMAINING_DAYS" ] && [ -f "/tmp/renew_data/remaining_days.txt" ]; then
            REMAINING_DAYS=$(cat /tmp/renew_data/remaining_days.txt)
          fi
          
          TOKEN_NUM="${{ steps.select_token.outputs.token_number }}"

          echo "剩余天数: $REMAINING_DAYS"
          echo "Token 编号: $TOKEN_NUM"

          # 计算下次运行时间（到期前 2 天）
          if (( $(echo "$REMAINING_DAYS > 2" | bc -l) )); then
            DAYS_UNTIL_NEXT_RUN=$(echo "$REMAINING_DAYS - 2" | bc)
          else
            DAYS_UNTIL_NEXT_RUN=0.5
            echo "::warning::剩余时间不足 2 天，12 小时后重试"
          fi

          DAYS_INT=$(printf "%.0f" "$DAYS_UNTIL_NEXT_RUN")
          NEXT_DATE=$(date -u -d "+${DAYS_INT} days" +"%Y-%m-%d %H:%M")
          NEXT_DAY=$(date -u -d "+${DAYS_INT} days" +"%-d")
          NEXT_MONTH=$(date -u -d "+${DAYS_INT} days" +"%-m")
          
          # 根据 Token 编号设置不同的小时（保持 01~05 UTC，避免冲突）
          case "$TOKEN_NUM" in
            1) NEXT_HOUR=1 ;;
            2) NEXT_HOUR=2 ;;
            3) NEXT_HOUR=3 ;;
            4) NEXT_HOUR=4 ;;
            5) NEXT_HOUR=5 ;;
            *) NEXT_HOUR=$(date -u +"%H") ;;
          esac
          
          NEXT_MINUTE=$(date -u +"%M")

          NEW_CRON="$NEXT_MINUTE $NEXT_HOUR $NEXT_DAY $NEXT_MONTH *"

          echo "::notice::📅 下次运行: $NEXT_DATE UTC"
          echo "::notice::⏰ 新 Cron: $NEW_CRON"

          # 切换到 workflow_repo 目录
          cd workflow_repo

          # 从 github.workflow_ref 提取当前 workflow 文件路径
          WORKFLOW_FILE=$(echo "${{ github.workflow_ref }}" | sed -E 's|^[^/]+/[^/]+/(\.github/workflows/[^@]+)@.*|\1|')

          echo "::notice::📄 当前 workflow 文件: $WORKFLOW_FILE"

          if [ ! -f "$WORKFLOW_FILE" ]; then
            echo "::error::文件不存在: $WORKFLOW_FILE"
            echo "::group::.github/workflows 目录内容"
            ls -la .github/workflows/
            echo "::endgroup::"
            exit 1
          fi

          # 查找对应 Token 的 cron 行
          TARGET_PATTERN="FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM"
          LINE_NUM=$(grep -n "$TARGET_PATTERN" "$WORKFLOW_FILE" | cut -d: -f1 | head -n1)

          if [ -z "$LINE_NUM" ]; then
            echo "::error::找不到 $TARGET_PATTERN 对应行"
            echo "::group::文件内容"
            nl -ba "$WORKFLOW_FILE"
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice::更新第 $LINE_NUM 行"

          echo "::group::原始行"
          sed -n "${LINE_NUM}p" "$WORKFLOW_FILE"
          echo "::endgroup::"

          # 替换指定行
          sed -i "${LINE_NUM}c\\    - cron: '$NEW_CRON'   # FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM - 下一次: $NEXT_DATE UTC" "$WORKFLOW_FILE"

          echo "::group::修改后"
          sed -n "${LINE_NUM}p" "$WORKFLOW_FILE"
          echo "::endgroup::"

          # 检查是否有变化
          if git diff --quiet "$WORKFLOW_FILE"; then
            echo "::notice::没有变化需要提交"
            exit 0
          fi

          echo "::group::完整修改内容"
          git diff "$WORKFLOW_FILE"
          echo "::endgroup::"

          # 提交并推送
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$WORKFLOW_FILE"
          
          git commit -m "自动调整 FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM 下次续期时间" \
                     -m "下次运行: $NEXT_DATE UTC" \
                     -m "Cron: $NEW_CRON" \
                     -m "剩余天数（最小值）: $REMAINING_DAYS"
          
          git remote set-url origin "https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/${{ github.repository }}.git"
          git push

          echo "::notice::✅ 成功更新 workflow 文件"

#      - name: 上传截图
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: renew-screenshots-token-${{ steps.select_token.outputs.token_number }}
#          path: screenshots/
#          retention-days: 7

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
